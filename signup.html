<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Endrobe | Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section>
        <h2 style="text-align: center;">Create Your Account</h2>
        <p style="text-align: center;">Begin your personalized certification journey.</p>

        <!-- Corrected form: Action points to dashboard.html -->
        <form action="dashboard.html" method="GET" style="max-width: 400px; margin: 0 auto;">
            <div style="margin-bottom: 15px;">
                <label>Full Name</label><br>
                <input type="text" name="name" style="width: 100%; padding: 10px; border: 2px solid #ffb6c1; border-radius: 8px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Email Address</label><br>
                <input type="email" name="email" style="width: 100%; padding: 10px; border: 2px solid #ffb6c1; border-radius: 8px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label>Academic Interest</label><br>
                <select name="interest" style="width: 100%; padding: 10px; border: 2px solid #ffb6c1; border-radius: 8px;">
                    <option value="science">Medical & Sciences</option>
                    <option value="arts">Creative Arts & Calligraphy</option>
                    <option value="tech">Software Development</option>
                </select>
            </div>

            <button type="submit" class="enroll-btn" style="border: none; cursor: pointer; width: 100%;">Sign Up</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            Already have an account? <a href="login.html" style="color: #9370db; font-weight: bold;">Log In</a>
        </p>
    </section>

</body>
</html>
