<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Tracks | Endrobe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section>
        <h2>Your Academic Track</h2>
        <p>Select your specialized learning path to begin your certification journey.</p>

        <form action="dashboard.html" method="GET">
            <div style="margin-bottom: 20px;">
                <label>Choose Your Focus</label><br>
                <select name="academic_track">
                    <optgroup label="Sciences">
                        <option value="med">Medical & Healthcare</option>
                        <option value="chem">Chemistry & Lab Research</option>
                    </optgroup>
                    <optgroup label="Creative & Tech">
                        <option value="calligraphy">Classical Calligraphy</option>
                        <option value="soft">Software Development</option>
                    </optgroup>
                </select>
            </div>

            <p class="requirement-text">
                Note: Ensure you have your project materials ready for your chosen track.
            </p>

            <button type="submit" class="enroll-btn">Select Track</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a href="dashboard.html" style="color: #9370db; font-weight: bold;">Back to Dashboard</a>
        </p>
    </section>

</body>
</html>
