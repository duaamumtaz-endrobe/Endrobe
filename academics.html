<style>
    /* Define Endrobe Palette */
    :root {
        --pink: #ffb6c1;
        --sky-blue: #87ceeb;
        --yellow: #fff44f;
        --lavender: #e6e6fa;
        --light-orange: #ffdab9;
        --light-gray: #f0f0f0;
        --text-dark: #4a4a4a;
    }

    /* Base Layout with Blueprint Background */
    body { 
        background-image: url('images/1000412574.png');
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
        font-family: 'Segoe UI', sans-serif;
    }

    /* Section Wrapper with Light Overlay */
    section { 
        background-color: rgba(255, 255, 255, 0.85); 
        border: 2px solid var(--lavender); 
        border-radius: 15px; 
        padding: 30px; 
        margin: 20px auto; 
        max-width: 900px;
    }

    h2, h3 { color: #9370db; /* Lavender */ }

    select { 
        background-color: var(--light-gray); 
        color: var(--text-dark); 
        border: 2px solid var(--pink); 
        padding: 10px;
        border-radius: 8px;
    }

    .requirement-text { 
        background-color: var(--yellow); 
        border-left: 4px solid var(--pink); 
        padding: 10px; 
        font-style: italic; 
        color: var(--text-dark);
    }

    /* Apply colors to options/groups for better visibility */
    optgroup { color: #9370db; font-weight: bold; }
    option { background: #fff; color: var(--text-dark); }
</style>
